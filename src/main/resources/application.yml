spring:
  datasource:
    url: jdbc:mysql://localhost:3306/export
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true

  security:
    user:
      name: none
      password: none

jwt:
  secret:
    key: ${JWT_SECRET_KEY}